name: Build and Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./... -v
      - run: go vet ./...

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Linux binaries
        run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o build/linux-amd64/ssh-portfolio ./cmd/server
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o build/linux-arm64/ssh-portfolio ./cmd/server

      - name: Compress binaries
        run: |
          cd build
          tar -czvf ssh-portfolio-linux-amd64.tar.gz linux-amd64
          tar -czvf ssh-portfolio-linux-arm64.tar.gz linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: build/*.tar.gz

      - name: Generate release tag
        run: echo "RELEASE_TAG=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ env.RELEASE_TAG }}
          name: "Release ${{ env.RELEASE_TAG }}"
          draft: true
          artifacts: |
            build/ssh-portfolio-linux-amd64.tar.gz
            build/ssh-portfolio-linux-arm64.tar.gz

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build Linux amd64 binary
        run: |
          mkdir -p build
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o build/ssh-portfolio-linux-amd64 ./cmd/server

      - name: Copy binary to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: build/ssh-portfolio-linux-amd64
          target: /tmp/

      - name: Install and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            sudo systemctl stop ssh-portfolio
            sudo cp /tmp/build/ssh-portfolio-linux-amd64 /opt/ssh-portfolio/ssh-portfolio
            sudo chmod +x /opt/ssh-portfolio/ssh-portfolio
            sudo chown portfolio:portfolio /opt/ssh-portfolio/ssh-portfolio
            sudo systemctl start ssh-portfolio
            sleep 1
            sudo systemctl is-active --quiet ssh-portfolio && echo "Deploy successful" || (echo "Deploy failed" && exit 1)
            rm -rf /tmp/build
